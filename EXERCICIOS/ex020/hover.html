<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div:hover {
            color: red;
        }

        div:hover > p {
            display: block;
            color: wheat;
            background-color: yellow;
            width: 130px;
        }

        div > p {
            display: none;
        }
  </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passa o rato em cima disto</p>
    <div>Passa o rato aqui
        <p>Texto escondido...</p>
    </div>
    <p>
        Fim do Exemplo
    </p>
</body>
</html>
