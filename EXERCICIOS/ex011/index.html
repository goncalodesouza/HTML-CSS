<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tenta abrir este site em díspositivos diferentes ou amplie e diminua o tamanho do site</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotoP-png.png" type="image/png">
        <source media="(max-width: 1100px)" srcset="imagens/fotoM-png.png" type="image/png">
        <img src="imagens/fotoG-png.png" alt="imagem flexivel">
    </picture>

    <h1>
        Audio
    </h1>
    <p>Vamos aprender a reproduzir audios</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/We Don't Care_spotdown.org.mp3" type="audio/mpeg">
        <source src="midia/We Don't Care_spotdown.org.ogg" type="audio/ogg">
        <source src="midia/We Don't Care_spotdown.org.wav" type="audio/wav">
        <p>Infelizmente o navegador não consegue reproduzir audios</p>
        <a href="midia/We Don't Care_spotdown.org.mp3">Clique aqui para baixar o arquivo</a>
    </audio>
</body>
</html>
