<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }
        th,td {
            border: 3px solid black;
        }
    </style>
</head>
<body>
    <h1>exercicio de tabela</h1>
    <table>
        <caption>
            Filmes preferidos
        </caption>
        <thead>
            <tr>
                <th scope="col">Grupos</th>
                <th scope="col">Nomes</th>
                <th colspan="3" scope="colgroup">Filmes</th>
            </tr>
        </thead>
        <tfoot>
            <th colspan="4" scope="row">Total</th>
            <td>1000</td>
        </tfoot>
        <tbody>
            <tr>
                <th rowspan="3" scope="rowgroup">Mulheres</th>
                <td>Beatriz</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
            </tr>
            <tr>
                <td>Cristiana</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
            </tr>
            <tr>
                <td>Bruna</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
            </tr>
             <tr>
                <th rowspan="3" scope="rowgroup">Homens</th>
                <td>Gonçalo</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
            </tr>
            <tr>
                <td>Luís</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
            </tr>
            <tr>
                <td>de Souza</td>
                <td>xxx</td>
                <td>xxx</td>
                <td>xxx</td>
        </tbody>
    </table>
</body>
</html>
