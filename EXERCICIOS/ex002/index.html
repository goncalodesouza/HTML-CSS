    <p>Se quiseres partir o texto em algum lugar, <br> tipo aqui, só usar a tag &lt;br&gt; </p>
    <p> <h3>Vamos adicionar alguns símbolos especiais:</h3><br>
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &dollar;
        &cent;
        &yen;
        &delta;
        &Delta;
    </p>

       &#x1F61D
    </p>
