<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container {
            background-color: darkblue;
            display: flex;
            flex-flow: row wrap;
        }
        div.item {
            background-color: rgb(0, 136, 255);
            border: 1px solid black;
            flex-basis: 150px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">Outra coisa</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">Outra coisa maior</div>
        <div class="item">F</div>
        <div class="item">Outra coisa ainda mais maior</div>
    </div>
</body>
</html>
